<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Me Listing Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="hero__eyebrow">Trade Me listing checker</p>
      <h1 class="hero__title">Paste a listing. We'll tell you what's off.</h1>
      <p class="hero__subtitle">
        A free pattern check runs first. If it can't call it confidently, Claude Haiku takes a second look at the wording, nothing more.
      </p>
    </header>

    <main>
      <div class="card import-card">
        <div class="field">
          <label for="import-url">Import from a Trade Me listing link</label>
          <div class="import-row">
            <input
              type="url"
              id="import-url"
              placeholder="https://www.trademe.co.nz/a/marketplace/.../listing/1234567890"
            />
            <button type="button" id="import-button" class="button button--secondary">
              <span class="button__label">Fetch listing</span>
            </button>
          </div>
          <p id="import-error" class="form-error" hidden></p>
        </div>
      </div>

      <p class="divider">or fill it in yourself</p>

      <form id="listing-form" class="card" novalidate>
        <div class="field">
          <label for="title">Listing title</label>
          <input type="text" id="title" name="title" required maxlength="200" placeholder="e.g. Generic wireless earbuds" />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="6" maxlength="5000" placeholder="Paste the full listing description here"></textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="price">Price (NZD)</label>
            <input type="number" id="price" name="price" min="0" step="0.01" placeholder="129.99" />
          </div>

          <div class="field">
            <label for="category">Category <span class="optional">optional</span></label>
            <input type="text" id="category" name="category" maxlength="100" placeholder="e.g. Electronics" />
          </div>
        </div>

        <fieldset class="field-group">
          <legend>Seller feedback <span class="optional">optional</span></legend>
          <div class="field-row">
            <div class="field">
              <label for="percentPositive">Percent positive</label>
              <input type="number" id="percentPositive" name="percentPositive" min="0" max="100" step="0.1" placeholder="98.5" />
            </div>
            <div class="field">
              <label for="reviewCount">Number of reviews</label>
              <input type="number" id="reviewCount" name="reviewCount" min="0" step="1" placeholder="12" />
            </div>
            <div class="field">
              <label for="memberSince">Member since</label>
              <input type="date" id="memberSince" name="memberSince" />
            </div>
          </div>
        </fieldset>

        <button type="submit" id="submit-button" class="button">
          <span class="button__label">Check this listing</span>
        </button>

        <p id="form-error" class="form-error" hidden></p>
      </form>

      <section id="results" class="results" hidden aria-live="polite"></section>
    </main>

    <footer class="footer">
      <p>Built by <a href="https://github.com/Arl-Heb" target="_blank" rel="noopener noreferrer">Arl-Heb</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
